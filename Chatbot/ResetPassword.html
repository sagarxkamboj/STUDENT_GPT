<!DOCTYPE html>
<html>
  <head>
    <title>Reset Password | StudentGPT</title>
    <style>
      <style > body {
        background: #131114;
        font-family: "Montserrat", Arial, sans-serif;
        margin: 0;
        color: #fff;
      }
      .container {
        max-width: 370px;
        background: #191725;
        margin: 60px auto;
        border-radius: 18px;
        box-shadow: 0 0 32px 6px #9173fa55;
        padding: 36px 32px 30px 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h2 {
        color: #a281ff;
        margin-top: 0;
        margin-bottom: 16px;
        text-shadow: 0 0 8px #b183ff80;
        font-size: 2.2rem;
        font-weight: 600;
        letter-spacing: 1px;
      }
      label {
        font-size: 1rem;
        color: #d1baff;
        display: block;
        margin-bottom: 3px;
        margin-top: 18px;
        text-align: left;
        width: 100%;
      }
      input[type="email"],
      input[type="text"],
      input[type="password"] {
        width: 100%;
        min-width: 220px;
        padding: 12px 10px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        background: #221f32;
        color: #fff;
        box-shadow: 0 0 8px #7a58e14d inset;
        transition: box-shadow 0.2s;
        margin-bottom: 6px;
      }
      input:focus {
        box-shadow: 0 0 12px #a281ff, 0 0 10px #7a58e1 inset;
      }
      button {
        background: linear-gradient(90deg, #a281ff 0%, #5730cd 100%);
        color: #fff;
        padding: 12px 0;
        width: 100%;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        margin-top: 16px;
        margin-bottom: 6px;
        cursor: pointer;
        box-shadow: 0 0 12px #a281ff90;
        transition: background 0.22s;
      }
      button:hover {
        background: linear-gradient(90deg, #6d40d7 0%, #a281ff 100%);
      }
      .msg {
        height: 24px;
        margin-bottom: 12px;
        color: #ffe984;
        font-size: 1rem;
        min-height: 24px;
        text-align: center;
        letter-spacing: 0.5px;
      }
      a {
        color: #c3aaff;
        text-decoration: none;
        font-size: 1rem;
        margin-top: 12px;
        display: inline-block;
        transition: color 0.22s;
      }
      a:hover {
        color: #ffe984;
        text-decoration: underline;
      }

      @import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap");
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Reset Password</h2>
      <div class="msg" id="msg"></div>
      <form id="reset-form">
        <label>Email:</label>
        <input type="email" id="email" required /><br />
        <button type="button" id="send-otp">Send OTP</button><br />

        <label>OTP:</label>
        <input type="text" id="otp" maxlength="6" /><br />

        <label>New Password:</label>
        <input type="password" id="newPassword" /><br />
        <button type="submit">Reset Password</button>
      </form>
      <a href="Login.html" style="color: #b8a5f5; font-size: 0.93rem"
        >Back to Login</a
      >
    </div>
    <script src="resetPassword.js"></script>
  </body>
</html>
